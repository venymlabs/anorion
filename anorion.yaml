gateway:
  host: 0.0.0.0
  port: 4250
  apiKeys:
    - name: admin
      key: ${ANORION_ADMIN_KEY:-anorion-dev-key}
      scopes: ["*"]
  database: ./data/anorion.db

agents:
  dir: ./agents
  defaultModel: zai/glm-5
  defaultTimeoutMs: 120000
  maxSubagents: 5
  idleTimeoutMs: 1800000

channels:
  telegram:
    enabled: true
    botToken: ${TELEGRAM_BOT_TOKEN}
    allowedUsers:
      - ${TELEGRAM_ALLOWED_USER_ID}
    defaultAgent: "001"

scheduler:
  enabled: false

bridge:
  enabled: false
  secret: ${BRIDGE_SECRET:-anorion-bridge-dev}
  port: 4260
  peers: []

memory:
  provider: file
  directory: ./data/memory
